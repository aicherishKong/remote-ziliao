<div class="slide">
    <div class="bg-dots"></div>
    <div class="bg-mesh"></div>

    <div class="content content-centered">
        <div class="animate-ready" data-delay="0">
            <span class="badge">结构细看 2/3</span>
        </div>

        <h2 class="animate-ready text-gradient-teal" data-delay="0.1" style="margin-top:16px;margin-bottom:14px;">
            深入看 SKILL.md：真正决定"进来以后怎么做"
        </h2>

        <p class="animate-ready center-block" data-delay="0.2" style="max-width:900px;margin-bottom:20px;">
            以官方 skill-creator 为例，看 frontmatter（路由层）和 body（控制层）如何协同工作。
        </p>

        <!-- 视图切换按钮 -->
        <div class="animate-ready center-block" data-delay="0.25" style="display:flex;gap:12px;justify-content:center;margin-bottom:24px;">
            <button class="skillmd-view-btn btn btn-primary" data-view="full">完整视图</button>
            <button class="skillmd-view-btn btn" data-view="frontmatter" style="background:var(--bg-white);color:var(--text-primary);border:1px solid var(--border);">frontmatter 层</button>
            <button class="skillmd-view-btn btn" data-view="body" style="background:var(--bg-white);color:var(--text-primary);border:1px solid var(--border);">body 层</button>
        </div>

        <!-- 主内容区：左右分栏 -->
        <div class="animate-ready center-block" data-delay="0.3" style="display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1200px;">
            <!-- 左侧：代码展示区 -->
            <div class="card" style="padding:20px;">
                <h3 style="margin:0 0 16px 0;font-size:1.1rem;color:var(--text-primary);">SKILL.md 结构</h3>
                <div id="skillmd-code-area" style="background:var(--bg-cool);padding:16px;border-radius:var(--radius-md);font-family:monospace;font-size:0.85rem;line-height:1.6;overflow-x:auto;max-height:400px;overflow-y:auto;">
                    <!-- 代码内容将由 JS 动态填充 -->
                </div>
            </div>

            <!-- 右侧：作用说明区 -->
            <div class="card" style="padding:20px;">
                <h3 style="margin:0 0 16px 0;font-size:1.1rem;color:var(--text-primary);">作用说明</h3>
                <div id="skillmd-explanation-area" style="color:var(--text-secondary);line-height:1.7;">
                    <!-- 说明内容将由 JS 动态填充 -->
                </div>
            </div>
        </div>

        <!-- 底部：协同关系说明 -->
        <div class="animate-ready center-block" data-delay="0.35" style="max-width:1000px;margin-top:24px;padding:16px 20px;background:var(--teal-pale);border:1px solid var(--teal-border);border-radius:var(--radius-md);">
            <p style="margin:0;font-size:0.95rem;color:var(--text-primary);text-align:center;">
                <strong>frontmatter（路由层）</strong> 决定"能否被找到" → <strong>body（控制层）</strong> 决定"进来后怎么做"
            </p>
        </div>
    </div>
</div>
