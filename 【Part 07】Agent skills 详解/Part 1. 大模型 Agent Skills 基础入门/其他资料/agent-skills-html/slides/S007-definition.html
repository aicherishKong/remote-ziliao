<div class="slide">
    <div class="bg-dots"></div>
    <div class="bg-mesh"></div>

    <div class="content content-centered">
        <div class="animate-ready" data-delay="0">
            <span class="badge">概念落点</span>
        </div>

        <h2 class="animate-ready text-gradient-teal" data-delay="0.1" style="margin-top:16px;margin-bottom:20px;">
            一句话理解什么是 Agent Skill
        </h2>

        <div class="animate-ready center-block" data-delay="0.2" style="max-width:1020px;padding:26px 30px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);">
            <p style="font-size:1.18rem;line-height:1.85;color:var(--text-primary);margin:0;">
                <strong style="color:var(--teal);">Skill</strong> 是一个可被 Agent 在运行时
                <strong>发现、理解、调用和组合</strong> 的能力模块。
            </p>
        </div>

        <div class="animate-ready center-block" data-delay="0.3" style="display:grid;grid-template-columns:1.15fr 0.85fr;gap:22px;max-width:1120px;margin-top:28px;">
            <div class="card">
                <div style="font-size:1rem;font-weight:700;margin-bottom:12px;">一个更容易记住的类比</div>
                <div style="display:grid;gap:12px;">
                    <div style="padding:16px;border-radius:var(--radius-md);background:var(--bg-cool);"><strong>Agent</strong> 像手机：负责理解意图并调度能力</div>
                    <div style="padding:16px;border-radius:var(--radius-md);background:var(--bg-cool);"><strong>Skill</strong> 能力像 App：给 Agent 增加可调用功能，附带使用说明书</div>
                    <div style="padding:16px;border-radius:var(--radius-md);background:var(--bg-cool);"><strong>生态与目录</strong> 像应用来源：让能力被发现、安装和管理</div>
                </div>
            </div>
            <div style="display:grid;gap:18px;">
                <div class="card"><h4 style="margin-bottom:10px;">先被发现</h4><p style="font-size:0.95rem;">路由不到，再好的能力也发挥不出来。</p></div>
                <div class="card"><h4 style="margin-bottom:10px;">再被调用</h4><p style="font-size:0.95rem;">Skill 不是摆设，它要能支撑任务推进。</p></div>
                <div class="card"><h4 style="margin-bottom:10px;">还能被维护</h4><p style="font-size:0.95rem;">这也是它和一次性 Prompt 的关键差别。</p></div>
            </div>
        </div>
    </div>
</div>
