<div class="slide">
    <div class="bg-dots"></div>

    <div class="content content-centered">
        <div class="animate-ready" data-delay="0">
            <span class="badge">动机建立</span>
        </div>

        <h2 class="animate-ready text-gradient-teal" data-delay="0.1" style="margin-top:16px;margin-bottom:14px;">
            开发者经常不是卡在“不会问”，而是卡在“AI 不会做”
        </h2>

        <p class="animate-ready center-block" data-delay="0.2" style="max-width:900px;margin-bottom:24px;">
            很多真实任务并不是一句答案能结束的。问题不在提示词不够长，而在任务背后需要稳定的能力链。
        </p>

        <div class="animate-ready center-block" data-delay="0.3" style="display:grid;grid-template-columns:1.2fr 0.8fr;gap:22px;max-width:1160px;">
            <div class="card">
                <div style="font-size:0.88rem;color:var(--text-tertiary);margin-bottom:12px;">一个熟悉的开发任务</div>
                <div style="display:grid;gap:12px;">
                    <div style="padding:14px 16px;border-radius:var(--radius-md);background:var(--bg-cool);color:var(--text-primary);">补单元测试，不只是写几个 `it()`</div>
                    <div style="padding:14px 16px;border-radius:var(--radius-md);background:var(--bg-cool);color:var(--text-primary);">批量整理 Markdown，不只是总结几段文字</div>
                    <div style="padding:14px 16px;border-radius:var(--radius-md);background:var(--bg-cool);color:var(--text-primary);">找适合的 Skill，不只是搜索一个文件名</div>
                </div>
            </div>

            <div class="card" style="background:linear-gradient(135deg,rgba(13,148,136,0.08),rgba(124,58,237,0.06));">
                <div style="font-size:0.88rem;color:var(--text-tertiary);margin-bottom:12px;">真正缺的是什么</div>
                <h4 style="margin-bottom:10px;">不是更多话术</h4>
                <p style="font-size:0.95rem;margin-bottom:12px;">而是：</p>
                <div style="display:grid;gap:10px;">
                    <div style="padding:10px 12px;border-radius:var(--radius-md);background:var(--bg-white);">可发现的能力</div>
                    <div style="padding:10px 12px;border-radius:var(--radius-md);background:var(--bg-white);">可执行的流程</div>
                    <div style="padding:10px 12px;border-radius:var(--radius-md);background:var(--bg-white);">可复用的结构</div>
                </div>
            </div>
        </div>

        <!-- 底部金句 -->
        <div class="animate-ready" data-delay="0.4" style="margin-top:40px;text-align:center;">
            <p style="font-size:1.1rem;font-weight:600;color:#DC2626;margin:0;">
                这些任务的共同特点：它们不是一句答案能结束的，而是需要一个稳定的、可复用的能力链
            </p>
        </div>
    </div>
</div>
