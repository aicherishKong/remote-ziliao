<div class="slide">
    <div class="bg-dots"></div>
    <div class="bg-mesh"></div>

    <div class="content content-centered">
        <div class="animate-ready" data-delay="0">
            <span class="badge">边界认知</span>
        </div>

        <h2 class="animate-ready text-gradient-teal" data-delay="0.1" style="margin-top:16px;margin-bottom:14px;">
            什么时候 Skill 会失效？先记住这张边界清单
        </h2>

        <div class="animate-ready center-block" data-delay="0.2" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;max-width:1120px;margin-top:24px;">
            <div class="card">
                <h4 style="margin-bottom:10px;">触发层问题</h4>
                <ul style="padding-left:18px;line-height:1.8;color:var(--text-secondary);">
                    <li>描述太模糊</li>
                    <li>边界没说清</li>
                    <li>典型场景表达不足</li>
                </ul>
            </div>
            <div class="card">
                <h4 style="margin-bottom:10px;">控制层问题</h4>
                <ul style="padding-left:18px;line-height:1.8;color:var(--text-secondary);">
                    <li>只有口号，没有流程</li>
                    <li>没有分支和约束</li>
                    <li>缺少验证机制</li>
                </ul>
            </div>
            <div class="card">
                <h4 style="margin-bottom:10px;">资源层问题</h4>
                <ul style="padding-left:18px;line-height:1.8;color:var(--text-secondary);">
                    <li>引用资料不全</li>
                    <li>重复动作没脚本化</li>
                    <li>没有模板或样例支撑</li>
                </ul>
            </div>
            <div class="card">
                <h4 style="margin-bottom:10px;">运行时问题</h4>
                <ul style="padding-left:18px;line-height:1.8;color:var(--text-secondary);">
                    <li>平台依赖没满足</li>
                    <li>上下文不足</li>
                    <li>任务本身超出能力范围</li>
                </ul>
            </div>
        </div>
    </div>
</div>
