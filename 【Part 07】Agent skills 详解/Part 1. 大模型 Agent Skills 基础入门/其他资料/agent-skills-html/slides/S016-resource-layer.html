<div class="slide">
    <div class="bg-dots"></div>

    <div class="content content-centered">
        <div class="animate-ready" data-delay="0">
            <span class="badge">结构细看 3/3</span>
        </div>

        <h2 class="animate-ready text-gradient-teal" data-delay="0.1" style="margin-top:16px;margin-bottom:14px;">
            深入看资源层：references、scripts、assets 为什么重要
        </h2>

        <p class="animate-ready center-block" data-delay="0.2" style="max-width:900px;margin-bottom:24px;">
            很多 Skill 看上去写了很多话，但一旦没有资源层支撑，就很难从“会说”变成“稳定做”。
        </p>

        <div class="animate-ready center-block" data-delay="0.3" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;max-width:1120px;">
            <div class="card">
                <h4 style="margin-bottom:10px;">references</h4>
                <p style="font-size:0.95rem;margin-bottom:12px;">放深入知识、变体细节、只在特定分支才需要的说明。</p>
                <div class="badge">让主 skill 保持轻量</div>
            </div>
            <div class="card">
                <h4 style="margin-bottom:10px;">scripts</h4>
                <p style="font-size:0.95rem;margin-bottom:12px;">放重复、脆弱、最好确定性执行的动作。</p>
                <div class="badge badge-purple">降低手工失误</div>
            </div>
            <div class="card">
                <h4 style="margin-bottom:10px;">assets</h4>
                <p style="font-size:0.95rem;margin-bottom:12px;">放模板、输出材料、结构骨架和可复用产物。</p>
                <div class="badge badge-amber">提升复用效率</div>
            </div>
        </div>
    </div>
</div>
