<div class="slide">
    <div class="bg-dots"></div>

    <div class="content content-centered">
        <div class="animate-ready" data-delay="0">
            <span class="badge">协同关系</span>
        </div>

        <h2 class="animate-ready text-gradient-teal" data-delay="0.1" style="margin-top:16px;margin-bottom:14px;">
            Skill 不是一堆文件并列摆着，而是 3 层在协同工作
        </h2>

        <p class="animate-ready center-block" data-delay="0.2" style="max-width:920px;margin-bottom:22px;">
            先选一个运行场景，看看请求是怎样穿过路由层、控制层和支撑层的。
        </p>

        <div class="animate-ready center-block" data-delay="0.25" style="display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:960px;margin-bottom:18px;">
            <button class="skill-flow-btn btn btn-primary" data-flow="discover">能力发现</button>
            <button class="skill-flow-btn btn" data-flow="execute" style="background:var(--bg-white);color:var(--text-primary);border:1px solid var(--border);">执行任务</button>
            <button class="skill-flow-btn btn" data-flow="maintain" style="background:var(--bg-white);color:var(--text-primary);border:1px solid var(--border);">持续维护</button>
        </div>

        <div class="animate-ready center-block" data-delay="0.3" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;max-width:1120px;">
            <div class="card content-left">
                <div style="font-size:0.84rem;color:var(--text-tertiary);margin-bottom:10px;">路由层</div>
                <h4 style="margin-bottom:10px;">frontmatter + agents</h4>
                <p id="flow-route" style="font-size:0.94rem;line-height:1.75;margin:0;"></p>
            </div>
            <div class="card content-left">
                <div style="font-size:0.84rem;color:var(--text-tertiary);margin-bottom:10px;">控制层</div>
                <h4 style="margin-bottom:10px;">SKILL.md</h4>
                <p id="flow-control" style="font-size:0.94rem;line-height:1.75;margin:0;"></p>
            </div>
            <div class="card content-left">
                <div style="font-size:0.84rem;color:var(--text-tertiary);margin-bottom:10px;">支撑层</div>
                <h4 style="margin-bottom:10px;">references / scripts / assets</h4>
                <p id="flow-support" style="font-size:0.94rem;line-height:1.75;margin:0;"></p>
            </div>
        </div>

        <div class="animate-ready center-block content-left" data-delay="0.35" style="max-width:1080px;margin-top:20px;padding:18px 22px;background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);">
            <div style="font-size:0.86rem;color:var(--text-tertiary);margin-bottom:10px;">这三层如何配合</div>
            <p id="flow-summary" style="font-size:0.95rem;line-height:1.78;margin:0;"></p>
        </div>
    </div>
</div>
